<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Access Gate</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
body { margin:0;font-family:Arial;background:#0f172a;color:#fff;text-align:center;}
.container {padding:20px;}
input{width:90%;padding:12px;margin:8px;border-radius:8px;border:none;}
button{width:90%;padding:14px;margin:8px;border-radius:10px;border:none;font-size:16px;}
.save{background:#475569;color:#fff;}
.go{background:#22c55e;color:#fff;}
.share{background:#2563eb;color:#fff;}
#qr{margin-top:20px;}
/* OTP card only: animated aurora frame + dark glass inner */
.otp-card{
  margin:28px auto 10px;
  max-width:340px;
  padding:3px;
  border-radius:22px;
  background:linear-gradient(125deg,#fbbf24,#f97316,#a855f7,#6366f1,#06b6d4,#c026d3,#fbbf24);
  background-size:400% 400%;
  animation:otpAurora 14s ease infinite;
  box-shadow:
    0 12px 40px rgba(0,0,0,.45),
    0 0 80px rgba(168,85,247,.28),
    0 0 120px rgba(6,182,212,.12);
}
@keyframes otpAurora{
  0%,100%{background-position:0% 40%}
  50%{background-position:100% 60%}
}
.otp-card-inner{
  padding:22px 18px 18px;
  border-radius:19px;
  background:linear-gradient(165deg,rgba(15,23,42,.88) 0%,rgba(2,6,23,.94) 55%,rgba(15,23,42,.9) 100%);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}
.otp-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:#cbd5e1;
  margin:0 0 4px;
  font-weight:600;
}
.otp-sub{
  font-size:14px;
  color:#94a3b8;
  margin:0 0 16px;
  line-height:1.4;
}
#otpOut{
  font-family:ui-monospace,SFMono-Regular,"Cascadia Mono","Roboto Mono",Menlo,monospace;
  font-size:clamp(32px,10vw,44px);
  font-weight:700;
  font-variant-numeric:tabular-nums;
  letter-spacing:0.08em;
  color:#fffbeb;
  text-shadow:0 0 24px rgba(251,191,36,.35),0 2px 8px rgba(0,0,0,.5);
  margin:0;
  min-height:1.15em;
  line-height:1.2;
}
#otpOut.otp-empty{
  color:#64748b;
  font-size:28px;
  letter-spacing:0.04em;
  text-shadow:none;
}
.otp-timer{
  margin-top:14px;
}
.otp-timer-track{
  height:10px;
  border-radius:999px;
  background:rgba(51,65,85,.85);
  overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.35);
}
.otp-timer-fill{
  height:100%;
  width:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#fbbf24,#f97316,#a855f7);
  background-size:200% 100%;
  transition:width 0.5s linear;
  box-shadow:0 0 12px rgba(251,191,36,.35);
}
#otpHint{
  font-size:13px;
  color:#a8b8d0;
  margin:10px 0 0;
  min-height:1.2em;
  line-height:1.4;
}
</style>
</head>
<body>

<div class="container">
<h2>Lakeridge Gate Access</h2>
<input id="mobile" placeholder="Mobile" inputmode="numeric">
<input id="secret" placeholder="Access Key">
<button class="save" onclick="save()">Save</button>
<button class="go" onclick="generateQR()">Generate QR</button>
<button class="share" onclick="shareQR()">Share QR</button>
<canvas id="qr"></canvas>
<section class="otp-card" aria-label="Visitor OTP">
  <div class="otp-card-inner">
    <p class="otp-label">Visitor OTP</p>
    <p class="otp-sub">Share over a call.</p>
    <p id="otpOut" class="otp-empty" role="status" aria-live="polite"></p>
    <div class="otp-timer" id="otpTimerBlock" hidden>
      <div class="otp-timer-track" id="otpTimerBar" role="progressbar" aria-valuemin="0" aria-valuemax="300" aria-valuenow="0" aria-label="Time left before this OTP refreshes">
        <div class="otp-timer-fill" id="otpTimerFill"></div>
      </div>
    </div>
    <p id="otpHint"></p>
  </div>
</section>
</div>

<script>
let currentCanvas = null;

/** Same 32-bit djb2 as firmware users.cpp (djb2_u32). */
function djb2(str) {
  let h = 5381 >>> 0;
  for (let i = 0; i < str.length; i++) {
    h = (((h << 5) + h) + str.charCodeAt(i)) >>> 0;
  }
  return h >>> 0;
}

/**
 * Must match users.cpp usersValidateOtpForVilla: payload = owner_key + "|" + decimal(tw),
 * h = djb2_u32(payload), t = uint32(tw * 0x9E3779B9), otp = (h ^ t) % 1e6.
 * Use Math.imul for t — plain * can lose uint32 bits when tw*golden exceeds safe integer range.
 */
function generateOTP(secret) {
  const tw = Math.floor(Date.now() / 1000 / 300);
  const combined = secret + "|" + String(tw);
  const h = djb2(combined) >>> 0;
  const t = Math.imul(tw, 0x9e3779b9) >>> 0;
  const mixed = (h ^ t) >>> 0;
  return (mixed % 1000000).toString().padStart(6, "0");
}

function currentOtpWindow() {
  return Math.floor(Date.now() / 1000 / 300);
}

function secondsUntilNextOtpWindow() {
  const now = Math.floor(Date.now() / 1000);
  return (currentOtpWindow() + 1) * 300 - now;
}

/** 5 min OTP bucket length — must match firmware window (300s). */
const OTP_WINDOW_SEC = 300;

function updateOtpTimerBar() {
  const block = document.getElementById("otpTimerBlock");
  const fill = document.getElementById("otpTimerFill");
  const bar = document.getElementById("otpTimerBar");
  if (!block || !fill || !bar) return;
  if (!localStorage.getItem("secret")) {
    block.hidden = true;
    return;
  }
  const rem = secondsUntilNextOtpWindow();
  const pct = Math.min(100, Math.max(0, (rem / OTP_WINDOW_SEC) * 100));
  fill.style.width = pct + "%";
  bar.setAttribute("aria-valuenow", String(rem));
  block.hidden = false;
}

let lastRenderedOtpWindow = null;

/** Groups as "123 456" for easier verbal reading; still one 6-digit code for the gate. */
function formatOtpForDisplay(digits6) {
  if (!digits6 || digits6.length !== 6 || !/^\d{6}$/.test(digits6)) {
    return digits6;
  }
  return digits6.slice(0, 3) + "  " + digits6.slice(3);
}

function refreshOtpDisplay() {
  const secret = localStorage.getItem("secret");
  const out = document.getElementById("otpOut");
  const hint = document.getElementById("otpHint");
  if (!out || !hint) return;
  if (!secret) {
    out.textContent = "—";
    out.classList.add("otp-empty");
    hint.textContent = "Save your mobile and access key to see the code";
    lastRenderedOtpWindow = null;
    const tb = document.getElementById("otpTimerBlock");
    if (tb) tb.hidden = true;
    return;
  }
  out.classList.remove("otp-empty");
  const tw = currentOtpWindow();
  out.textContent = formatOtpForDisplay(generateOTP(secret));
  lastRenderedOtpWindow = tw;
  hint.textContent = "";
  updateOtpTimerBar();
}

function tickOtp() {
  const secret = localStorage.getItem("secret");
  if (!secret) {
    refreshOtpDisplay();
    return;
  }
  const tw = currentOtpWindow();
  if (lastRenderedOtpWindow !== tw) {
    refreshOtpDisplay();
  } else {
    updateOtpTimerBar();
  }
}

function getDeviceId() {
  let id = localStorage.getItem("gateDeviceId");
  if (!id) {
    id = (crypto.randomUUID && crypto.randomUUID()) || ("dev-" + Math.random().toString(36).slice(2));
    localStorage.setItem("gateDeviceId", id);
  }
  return id;
}

function save() {
  const mobile = document.getElementById("mobile").value.trim();
  const secret = document.getElementById("secret").value.trim();

  if (!mobile || !secret) {
    alert("Enter mobile and secret");
    return;
  }

  localStorage.setItem("mobile", mobile);
  localStorage.setItem("secret", secret);
  refreshOtpDisplay();

  alert("Saved");
}

async function generateQR() {
  const mobile = localStorage.getItem("mobile");
  const secret = localStorage.getItem("secret");
  if (!mobile || !secret) { alert("Enter details"); return; }

  const ts = Math.floor(Date.now()/1000);
  const sig = await hmacSHA256(secret, mobile+ts);
  const deviceId = getDeviceId();

  const url = "http://192.168.4.1/open?m=" + encodeURIComponent(mobile)
    + "&t=" + encodeURIComponent(String(ts))
    + "&d=" + encodeURIComponent(deviceId)
    + "&s=" + encodeURIComponent(sig)
    + "&otp=false";

  QRCode.toCanvas(document.getElementById("qr"), url, function(err, canvas){
    if (!err) currentCanvas = canvas;
  });
}

async function hmacSHA256(key, data) {
  const enc = new TextEncoder();
  const cryptoKey = await crypto.subtle.importKey(
    "raw", enc.encode(key),
    { name: "HMAC", hash: "SHA-256" },
    false, ["sign"]
  );
  const signature = await crypto.subtle.sign("HMAC", cryptoKey, enc.encode(data));
  return Array.from(new Uint8Array(signature))
    .map(b => b.toString(16).padStart(2, "0")).join("");
}

window.addEventListener("load", function () {
  const m = localStorage.getItem("mobile");
  const s = localStorage.getItem("secret");
  if (m) document.getElementById("mobile").value = m;
  if (s) document.getElementById("secret").value = s;
  refreshOtpDisplay();
  setInterval(tickOtp, 500);
});

document.addEventListener("visibilitychange", function () {
  if (document.visibilityState === "visible") {
    refreshOtpDisplay();
  }
});

function shareQR() {
  if (!currentCanvas) {
    alert("Generate QR first");
    return;
  }

  currentCanvas.toBlob(function (blob) {
    const file = new File([blob], "gate_qr.png", { type: "image/png" });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({
        files: [file],
        title: "Gate QR"
      }).catch(() => fallbackShare());
    } else {
      fallbackShare();
    }

    function fallbackShare() {
      const text = "Scan this QR at gate";
      const waUrl = "https://wa.me/?text=" + encodeURIComponent(text);

      window.open(waUrl, "_blank");

      alert("If QR image is not attached, please take screenshot and share.");
    }
  });
}

if ("serviceWorker" in navigator) {
 navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
